# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# For window rules and layerrules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# NOTES: This is only for Hyprland > 0.48

# note for ja: This should NOT be implemented on Debian and Ubuntu

# windowrule - tags - add apps under appropriate tag to use the same settings
# browser tags
windowrule = tag +browser, match:class ^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr|[Ff]irefox-bin)$
windowrule = tag +browser, match:class ^([Gg]oogle-chrome(-beta|-dev|-unstable)?)$
windowrule = tag +browser, match:class ^(chrome-.+-Default)$ # Chrome PWAs
windowrule = tag +browser, match:class ^([Cc]hromium)$
windowrule = tag +browser, match:class ^([Mm]icrosoft-edge(-stable|-beta|-dev|-unstable))$
windowrule = tag +browser, match:class ^(Brave-browser(-beta|-dev|-unstable)?)$
windowrule = tag +browser, match:class ^([Tt]horium-browser|[Cc]achy-browser)$
windowrule = tag +browser, match:class ^(zen-alpha|zen)$

# notif tags
windowrule = tag +notif, match:class ^(swaync-control-center|swaync-notification-window|swaync-client|class)$

# KooL settings tag
windowrule = tag +KooL_Cheat, match:title ^(KooL Quick Cheat Sheet)$
windowrule = tag +KooL_Settings, match:title ^(KooL Hyprland Settings)$
windowrule = tag +KooL-Settings, match:class ^(nwg-displays|nwg-look)$

# terminal tags
windowrule = tag +terminal, match:class ^(Alacritty|kitty|kitty-dropterm)$

# email tags
windowrule = tag +email, match:class ^([Tt]hunderbird|org.gnome.Evolution)$
windowrule = tag +email, match:class ^(eu.betterbird.Betterbird)$

# project tags
windowrule = tag +projects, match:class ^(codium|codium-url-handler|VSCodium)$
windowrule = tag +projects, match:class ^(VSCode|code-url-handler)$
windowrule = tag +projects, match:class ^(jetbrains-.+)$ # JetBrains IDEs

# screenshare tags
windowrule = tag +screenshare, match:class ^(com.obsproject.Studio)$

# IM tags
windowrule = tag +im_silent, match:class ^([Dd]iscord|[Ww]ebCord|[Vv]esktop)$  # Discord
windowrule = tag +im, match:class ^([Ff]erdium)$
windowrule = tag +im, match:class ^([Ww]hatsapp-for-linux)$
windowrule = tag +im, match:class ^(ZapZap|com.rtosta.zapzap)$
windowrule = tag +im, match:class ^(org.telegram.desktop|io.github.tdesktop_x64.TDesktop)$
windowrule = tag +im, match:class ^(teams-for-linux)$
windowrule = tag +im, match:class ^(im.riot.Riot|Element)$ # Element Matrix client

# game tags
windowrule = tag +games, match:class ^(gamescope)$
windowrule = tag +games, match:class ^(steam_app_\d+)$
# r2modman games have to be added one-by-one
windowrule = tag +games, match:class ^(valheim.+)$

# gamestore tags
#windowrule = tag +gamestore, match:class ^([Ss]team)$
windowrule = tag +gamestore, match:title ^([Ll]utris)$
windowrule = tag +gamestore, match:title ^(r2modman)$

# file-manager tags
windowrule = tag +file-manager, match:class ^([Tt]hunar|org.gnome.Nautilus|[Pp]cmanfm-qt)$
windowrule = tag +file-manager, match:class ^(app.drey.Warp)$

# wallpaper tags
windowrule = tag +wallpaper, match:class ^([Ww]aytrogen)$

# multimedia tags
windowrule = tag +multimedia, match:class ^([Aa]udacious)$

# multimedia-video tags
windowrule = tag +multimedia_video, match:xwayland 0, match:fullscreen 0, match:title ^.*(Twitch).*$
windowrule = tag +multimedia_video, match:xwayland 0, match:fullscreen 0, match:title ^.*(YouTube).*$
windowrule = tag +multimedia_video, match:xwayland 0, match:fullscreen 0, match:title ^.*(Paramount).*$
windowrule = tag +multimedia_video, match:xwayland 0, match:fullscreen 0, match:title ^.*(Netflix).*$
windowrule = tag +multimedia_video, match:xwayland 0, match:fullscreen 0, match:title ^.*(HBO).*$
windowrule = tag +multimedia_video, match:xwayland 0, match:fullscreen 0, match:title ^.*(Hulu).*$
windowrule = tag +multimedia_video, match:class ^([Mm]pv|vlc)$

# Some special override rules
windowrule = tag -browser, match:tag multimedia_video
windowrule = opaque, match:tag multimedia_video
windowrule = nodim, match:tag multimedia_video

# settings tags
windowrule = tag +settings, title ^(ROG Control)$
windowrule = tag +settings, class ^(wihotspot(-gui)?)$ # wifi hotspot
windowrule = tag +settings, class ^([Bb]aobab|org.gnome.[Bb]aobab)$ # Disk usage analyzer
windowrule = tag +settings, class ^(gnome-disks|wihotspot(-gui)?)$
windowrule = tag +settings, title (Kvantum Manager)
windowrule = tag +settings, class ^(file-roller|org.gnome.FileRoller)$ # archive manager
windowrule = tag +settings, class ^(nm-applet|nm-connection-editor|blueman-manager)$
windowrule = tag +settings, class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$
windowrule = tag +settings, class ^(qt5ct|qt6ct|[Yy]ad)$
windowrule = tag +settings, class (xdg-desktop-portal-gtk)
windowrule = tag +settings, class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = tag +settings, class ^([Rr]ofi)$

# viewer tags
windowrule = tag +viewer, match:class ^(gnome-system-monitor|org.gnome.SystemMonitor|io.missioncenter.MissionCenter)$ # system monitor
windowrule = tag +viewer, match:class ^(evince)$ # document viewer
windowrule = tag +viewer, match:class ^(eog|org.gnome.Loupe)$ # image viewer

# POSITION
# windowrule = center, match:floating 1 # warning, it cause even the menu to float and center.
windowrule = center 1, match:tag KooL_Cheat
windowrule = center 1, match:class ([Tt]hunar), match:title negative:(.*[Tt]hunar.*)
windowrule = center 1, match:title ^(ROG Control)$
windowrule = center 1, match:tag KooL-Settings
windowrule = center 1, match:title ^(Keybindings)$
windowrule = center 1, match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$
windowrule = center 1, match:class ^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$
windowrule = center 1, match:class ^([Ff]erdium)$
windowrule = move 72% 7%, match:title ^(Picture-in-Picture)$
#windowrule = move 72% 7%, title:^(Firefox)$

# windowrule to avoid idle for fullscreen apps
#windowrule = idleinhibit fullscreen,match:class ^(*)$
#windowrule = idleinhibit fullscreen,match:title ^(*)$
# windowrule = idleinhibit fullscreen, match:fullscreen 1

# windowrule move to workspace
#windowrule = workspace 3, match:class ^([Tt]hunar)$
#windowrule = workspace 3, match:tag projects
windowrule = workspace 2, match:tag games
windowrule = workspace 3, match:tag im
windowrule = workspace 3 silent, match:tag im_silent  # Silent so Discord on startup doesn't steal focus
windowrule = workspace 4, match:tag gamestore
windowrule = workspace 4 silent, match:class ^([Ss]team)$  # Silent so Steam on startup doesn't steal focus

# windowrule move to workspace (silent)
windowrule = workspace 4 silent, match:tag screenshare
windowrule = workspace 6 silent, match:class ^(virt-manager)$
windowrule = workspace 6 silent, match:class ^(.virt-manager-wrapped)$
windowrule = workspace 9 silent, match:tag multimedia

# FLOAT
windowrule = float 1, match:tag KooL_Cheat
windowrule = float 1, match:tag wallpaper
windowrule = float 1, match:tag settings
windowrule = float 1, match:tag viewer
windowrule = float 1, match:tag KooL-Settings
windowrule = float 1, match:class ([Zz]oom|onedriver|onedriver-launcher)$
windowrule = float 1, match:class (org.gnome.Calculator), match:title (Calculator)
windowrule = float 1, match:class ^(mpv|com.github.rafostar.Clapper)$
windowrule = float 1, match:class ^([Qq]alculate-gtk)$
#windowrule = float 1, match:class ^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$
windowrule = float 1, match:class ^([Ff]erdium)$
windowrule = float 1, match:title ^(Picture-in-Picture)$
#windowrule = float 1, match:title ^(Firefox)$

# windowrule - ######### float popups and dialogue #######
windowrule = float 1, match:title ^(Authentication Required)$
windowrule = center 1, match:title ^(Authentication Required)$
windowrule = float 1, match:class (codium|codium-url-handler|VSCodium), match:title negative:(.*codium.*|.*VSCodium.*)
windowrule = float 1, match:class ^([Ss]team)$, match:title negative:^([Ss]team)$
windowrule = float 1, match:class ([Tt]hunar), match:title negative:(.*[Tt]hunar.*)

windowrule = float 1, match:title ^(Add Folder to Workspace)$
windowrule = size 70% 60%, match:title ^(Add Folder to Workspace)$
windowrule = center 1, match:title ^(Add Folder to Workspace)$

windowrule = float 1, match:title ^(Save As)$
windowrule = size 70% 60%, match:title ^(Save As)$
windowrule = center 1, match:title ^(Save As)$

windowrule = float 1, match:initial_title (Open Files)
windowrule = size 70% 60%, match:initial_title (Open Files)

windowrule = float 1, match:title ^(SDDM Background)$ #KooL's Dots YAD for setting SDDM background
windowrule = center 1, match:title ^(SDDM Background)$ #KooL's Dots YAD for setting SDDM background
windowrule = size 16% 12%, match:title ^(SDDM Background)$ #KooL's Dots YAD for setting SDDM background
# END of float popups and dialogue #######

# OPACITY
windowrule = opacity 0.9 0.7, match:tag browser
windowrule = opacity 0.9 0.8, match:tag projects
windowrule = opacity 0.94 0.86, match:tag im
#windowrule = opacity 0.94 0.86, match:tag multimedia
windowrule = opacity 0.9 0.8, match:tag file-manager
windowrule = opacity 0.8 0.7, match:tag terminal
windowrule = opacity 0.8 0.7, match:tag settings
windowrule = opacity 0.82 0.75, match:tag viewer
windowrule = opacity 0.9 0.7, match:tag wallpaper
windowrule = opacity 0.8 0.7, match:class ^(gedit|org.gnome.TextEditor|mousepad)$
windowrule = opacity 0.9 0.8, match:class ^(deluge)$
windowrule = opacity 0.9 0.8, match:class ^(seahorse)$ # gnome-keyring gui
# Video content should always be opaque (override other rules)
windowrule = opaque, match:tag multimedia_video
windowrule = opaque, match:title ^(Picture-in-Picture)$

# SIZE
windowrule = size 65% 90%, match:tag KooL_Cheat
windowrule = size 70% 70%, match:tag wallpaper
windowrule = size 70% 70%, match:tag settings
windowrule = size 60% 70%, match:class ^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$
windowrule = size 60% 70%, match:class ^([Ff]erdium)$

#windowrule = size 25% 25%, match:title ^(Picture-in-Picture)$
#windowrule = size 25% 25%, match:title ^(Firefox)$

# PINNING
windowrule = float 1, match:title ^(Picture in picture)$
windowrule = pin 1, match:title ^(Picture in picture)$
windowrule = pin 1, match:title ^(Picture-in-Picture)$
#windowrule = pin 1, match:title ^(Firefox)$

# windowrule - extras
windowrule = keep_aspect_ratio 1, match:title ^(Picture-in-Picture)$

# BLUR & FULLSCREEN
windowrule = noblur, match:tag games
windowrule = fullscreen, match:tag games
windowrule = opaque, match:tag games
windowrule = opaque, match:title ^.*RuneLite.*$

# Runelite tooltips don't steal focus and have no decorations
windowrule = nofocus, match:class ^(net-runelite-client-RuneLite)$, match:title ^(win[0-9]+)$, match:floating 1
windowrule = noborder, match:class ^(net-runelite-client-RuneLite)$, match:title ^(win[0-9]+)$, match:floating 1
windowrule = noshadow, match:class ^(net-runelite-client-RuneLite)$, match:title ^(win[0-9]+)$, match:floating 1
windowrule = noanim, match:class ^(net-runelite-client-RuneLite)$, match:title ^(win[0-9]+)$, match:floating 1

# LAYER RULES
layerrule = blur on, match:namespace rofi
layerrule = ignorealpha 0, match:namespace rofi
layerrule = blur on, match:namespace notifications
layerrule = ignorealpha 0, match:namespace notifications
layerrule = blur on, match:namespace quickshell:overview
layerrule = ignorealpha 0.5, match:namespace quickshell:overview

#layerrule = ignorealpha 0.5, tag:notif

#layerrule = ignorezero, class:^([Rr]ofi)$
#layerrule = blur on, class:^([Rr]ofi)$
#layerrule = unset 1, class:^([Rr]ofi)$
#layerrule = ignorezero, <rofi>

#layerrule = ignorezero, overview
#layerrule = blur on, overview
