# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# For window rules and layerrules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# NOTES: This is only for Hyprland > 0.48

# note for ja: This should NOT be implemented on Debian and Ubuntu

# windowrule - tags - add apps under appropriate tag to use the same settings
# browser tags
windowrule = match:class ^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr|[Ff]irefox-bin)$, tag +browser
windowrule = match:class ^([Gg]oogle-chrome(-beta|-dev|-unstable)?)$, tag +browser
windowrule = match:class ^(chrome-.+-Default)$, tag +browser # Chrome PWAs
windowrule = match:class ^([Cc]hromium)$, tag +browser
windowrule = match:class ^([Mm]icrosoft-edge(-stable|-beta|-dev|-unstable))$, tag +browser
windowrule = match:class ^(Brave-browser(-beta|-dev|-unstable)?)$, tag +browser
windowrule = match:class ^([Tt]horium-browser|[Cc]achy-browser)$, tag +browser
windowrule = match:class ^(zen-alpha|zen)$, tag +browser

# notif tags
windowrule = match:class ^(swaync-control-center|swaync-notification-window|swaync-client|class)$, tag +notif

# KooL settings tag
windowrule = match:title ^(KooL Quick Cheat Sheet)$, tag +KooL_Cheat
windowrule = match:title ^(KooL Hyprland Settings)$, tag +KooL_Settings
windowrule = match:class ^(nwg-displays|nwg-look)$, tag +KooL-Settings

# terminal tags
windowrule = match:class ^(Alacritty|kitty|kitty-dropterm)$, tag +terminal

# email tags
windowrule = match:class ^([Tt]hunderbird|org.gnome.Evolution)$, tag +email
windowrule = match:class ^(eu.betterbird.Betterbird)$, tag +email

# project tags
windowrule = match:class ^(codium|codium-url-handler|VSCodium)$, tag +projects
windowrule = match:class ^(VSCode|code-url-handler)$, tag +projects
windowrule = match:class ^(jetbrains-.+)$, tag +projects # JetBrains IDEs

# screenshare tags
windowrule = match:class ^(com.obsproject.Studio)$, tag +screenshare

# IM tags
windowrule = match:class ^([Dd]iscord|[Ww]ebCord|[Vv]esktop)$, tag +im_silent  # Discord
windowrule = match:class ^([Ff]erdium)$, tag +im
windowrule = match:class ^([Ww]hatsapp-for-linux)$, tag +im
windowrule = match:class ^(ZapZap|com.rtosta.zapzap)$, tag +im
windowrule = match:class ^(org.telegram.desktop|io.github.tdesktop_x64.TDesktop)$, tag +im
windowrule = match:class ^(teams-for-linux)$, tag +im
windowrule = match:class ^(im.riot.Riot|Element)$, tag +im # Element Matrix client

# game tags
windowrule = match:class ^(gamescope)$, tag +games
windowrule = match:class ^(steam_app_\d+)$, tag +games
# r2modman games have to be added one-by-one
windowrule = match:class ^(valheim.+)$, tag +games

# gamestore tags
#windowrule = match:class ^([Ss]team)$, tag +gamestore
windowrule = match:title ^([Ll]utris)$, tag +gamestore
windowrule = match:title ^(r2modman)$, tag +gamestore

# file-manager tags
windowrule = match:class ^([Tt]hunar|org.gnome.Nautilus|[Pp]cmanfm-qt)$, tag +file-manager
windowrule = match:class ^(app.drey.Warp)$, tag +file-manager

# wallpaper tags
windowrule = match:class ^([Ww]aytrogen)$, tag +wallpaper

# multimedia tags
windowrule = match:class ^([Aa]udacious)$, tag +multimedia

# multimedia-video tags
windowrule = match:content video, tag +multimedia_video
windowrule = match:title ^.*(Twitch).*$, tag +multimedia_video
windowrule = match:title ^.*(YouTube).*$, tag +multimedia_video
windowrule = match:title ^.*(Paramount).*$, tag +multimedia_video
windowrule = match:title ^.*(Netflix).*$, tag +multimedia_video
windowrule = match:title ^.*(HBO).*$, tag +multimedia_video
windowrule = match:title ^.*(Hulu).*$, tag +multimedia_video
windowrule = match:class ^([Mm]pv|vlc)$, tag +multimedia_video
windowrule = match:class ^([Mm]pv|vlc)$, tag +multimedia_video

# Some special override rules
windowrule = match:tag multimedia_video.*, tag -browser
windowrule = match:tag multimedia_video.*, opacity 2.0
windowrule = match:tag multimedia_video.*, no_dim 1

# settings tags
windowrule = match:title ^(ROG Control)$, tag +settings
windowrule = match:class ^(wihotspot(-gui)?)$, tag +settings # wifi hotspot
windowrule = match:class ^([Bb]aobab|org.gnome.[Bb]aobab)$, tag +settings # Disk usage analyzer
windowrule = match:class ^(gnome-disks|wihotspot(-gui)?)$, tag +settings
windowrule = match:title (Kvantum Manager), tag +settings
windowrule = match:class ^(file-roller|org.gnome.FileRoller)$, tag +settings # archive manager
windowrule = match:class ^(nm-applet|nm-connection-editor|blueman-manager)$, tag +settings
windowrule = match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$, tag +settings
windowrule = match:class ^(qt5ct|qt6ct|[Yy]ad)$, tag +settings
windowrule = match:class (xdg-desktop-portal-gtk), tag +settings
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, tag +settings
windowrule = match:class ^([Rr]ofi)$, tag +settings

# viewer tags
windowrule = match:class ^(gnome-system-monitor|org.gnome.SystemMonitor|io.missioncenter.MissionCenter)$, tag +viewer # system monitor
windowrule = match:class ^(evince)$, tag +viewer # document viewer
windowrule = match:class ^(eog|org.gnome.Loupe)$, tag +viewer # image viewer

# POSITION
# windowrule = center,floating:1 # warning, it cause even the menu to float and center.
windowrule = match:tag KooL_Cheat.*, center 1
windowrule = match:class ([Tt]hunar), match:title negative:(.*[Tt]hunar.*), center 1
windowrule = match:title ^(ROG Control)$, center 1
windowrule = match:tag KooL-Settings.*, center 1
windowrule = match:title ^(Keybindings)$, center 1
windowrule = match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$, center 1
windowrule = match:class ^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$, center 1
windowrule = match:class ^([Ff]erdium)$, center 1
windowrule = match:title ^(Picture-in-Picture)$, move 72% 7%
#windowrule = move 72% 7%,match:title ^(Firefox)$

# windowrule to avoid idle for fullscreen apps
#windowrule = idleinhibit fullscreen,match:class ^(*)$
#windowrule = idleinhibit fullscreen,match:title ^(*)$
# windowrule = idleinhibit fullscreen, match:fullscreen 1

# windowrule move to workspace
#windowrule = match:class ^([Tt]hunar)$, workspace 3
#windowrule = match:tag projects*, workspace 3
windowrule = match:tag games.*, workspace 2
windowrule = match:tag im, workspace 3
windowrule = match:tag im_silent.*, workspace 3 silent  # Silent so Discord on startup doesn't steal focus
windowrule = match:tag gamestore.*, workspace 4
windowrule = match:class ^([Ss]team)$, workspace 4 silent  # Silent so Steam on startup doesn't steal focus

# windowrule move to workspace (silent)
windowrule = match:tag screenshare.*, workspace 4 silent
windowrule = match:class ^(virt-manager)$, workspace 6 silent
windowrule = match:class ^(.virt-manager-wrapped)$, workspace 6 silent
windowrule = match:tag multimedia.*, workspace 9 silent

# FLOAT
windowrule = match:tag KooL_Cheat.*, float 1
windowrule = match:tag wallpaper.*, float 1
windowrule = match:tag settings.*, float 1
windowrule = match:tag viewer.*, float 1
windowrule = match:tag KooL-Settings.*, float 1
windowrule = match:class ([Zz]oom|onedriver|onedriver-launcher)$, float 1
windowrule = match:class (org.gnome.Calculator), match:title (Calculator), float 1
windowrule = match:class ^(mpv|com.github.rafostar.Clapper)$, float 1
windowrule = match:class ^([Qq]alculate-gtk)$, float 1
#windowrule = match:class ^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$, float 1
windowrule = match:class ^([Ff]erdium)$, float 1
windowrule = match:title ^(Picture-in-Picture)$, float 1
#windowrule = match:title ^(Firefox)$, float 1

# windowrule - ######### float popups and dialogue #######
windowrule = match:title ^(Authentication Required)$, float 1
windowrule = match:title ^(Authentication Required)$, center 1
windowrule = match:class (codium|codium-url-handler|VSCodium), match:title negative:(.*codium.*|.*VSCodium.*), float 1
windowrule = match:class ^([Ss]team)$, match:title negative:^([Ss]team)$, float 1
windowrule = match:class ([Tt]hunar), match:title negative:(.*[Tt]hunar.*), float 1

windowrule = match:title ^(Add Folder to Workspace)$, float 1
windowrule = match:title ^(Add Folder to Workspace)$, size 70% 60%
windowrule = match:title ^(Add Folder to Workspace)$, center 1

windowrule = match:title ^(Save As)$, float 1
windowrule = match:title ^(Save As)$, size 70% 60%
windowrule = match:title ^(Save As)$, center 1

windowrule = match:initial_title (Open Files), float 1
windowrule = match:initial_title (Open Files), size 70% 60%

windowrule = match:title ^(SDDM Background)$, float 1 #KooL's Dots YAD for setting SDDM background
windowrule = match:title ^(SDDM Background)$, center 1 #KooL's Dots YAD for setting SDDM background
windowrule = match:title ^(SDDM Background)$, size 16% 12% #KooL's Dots YAD for setting SDDM background
# END of float popups and dialogue #######

# OPACITY
windowrule = match:tag browser*, opacity 0.9 0.7
windowrule = match:tag projects*, opacity 0.9 0.8
windowrule = match:tag im*, opacity 0.94 0.86
#windowrule = match:tag multimedia*, opacity 0.94 0.86
windowrule = match:tag file-manager*, opacity 0.9 0.8
windowrule = match:tag terminal*, opacity 0.8 0.7
windowrule = match:tag settings*, opacity 0.8 0.7
windowrule = match:tag viewer*, opacity 0.82 0.75
windowrule = match:tag wallpaper*, opacity 0.9 0.7
windowrule = match:class ^(gedit|org.gnome.TextEditor|mousepad)$, opacity 0.8 0.7
windowrule = match:class ^(deluge)$, opacity 0.9 0.8
windowrule = match:class ^(seahorse)$, opacity 0.9 0.8 # gnome-keyring gui
windowrule = match:title ^(Picture-in-Picture)$, opacity 2.0

# SIZE
windowrule = match:tag KooL_Cheat*, size 65% 90%
windowrule = match:tag wallpaper*, size 70% 70%
windowrule = match:tag settings*, size 70% 70%
windowrule = match:class ^([Ww]hatsapp-for-linux|ZapZap|com.rtosta.zapzap)$, size 60% 70%
windowrule = match:class ^([Ff]erdium)$, size 60% 70%

#windowrule = size 25% 25%,match:title ^(Picture-in-Picture)$
#windowrule = size 25% 25%,match:title ^(Firefox)$

# PINNING
windowrule = match:title ^(Picture in picture)$, float 1
windowrule = match:title ^(Picture in picture)$, pin 1
windowrule = match:title ^(Picture-in-Picture)$, pin 1
#windowrule = match:title ^(Firefox)$, pin 1

# windowrule - extras
windowrule = match:title ^(Picture-in-Picture)$, keep_aspect_ratio 1

# BLUR & FULLSCREEN
windowrule = match:tag games.*, no_blur 1
windowrule = match:tag games.*, fullscreen 1
windowrule = match:tag games.*, opacity 2
windowrule = match:title ^.*RuneLite.*$, opacity 2

# Runelite tooltips don't steal focus
windowrule = match:floating 1, match:class net-runelite-client-RuneLite, match:title ^(win\d+)$, no_focus on

# LAYER RULES
layerrule = match:namespace rofi, blur on, ignore_alpha 0
layerrule = match:namespace notifications, blur on, ignore_alpha 0
layerrule = match:namespace quickshell:overview, blur on, ignore_alpha 0
layerrule = match:namespace quickshell:overview, ignore_alpha 0.5

#layerrule = ignore_alpha 0.5, match:tag notif.*

#layerrule = ignore_zero, match:class ^([Rr]ofi)$
#layerrule = blur on, match:class ^([Rr]ofi)$
#layerrule = unset 1, match:class ^([Rr]ofi)$
#layerrule = ignore_zero, <rofi>

#layerrule = ignore_zero, overview
#layerrule = blur on, overview
