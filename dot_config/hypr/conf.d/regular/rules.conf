
# DO NOT EDIT THIS FILE. MAKE YOUR CHANGES IN CUSTOM.D.

windowrule = suppressevent maximize, match:class .*
windowrule = nofocus, match:class ^$, match:title ^$, match:xwayland 1, match:floating 1, match:fullscreen 0, match:pinned 0

layerrule = blur, match:namespace walker
layerrule = ignorealpha 0.41, match:namespace walker
layerrule = blur, match:namespace hyprland-shell:bar
layerrule = blurpopups, match:namespace hyprland-shell:bar
layerrule = ignorealpha 0.41, match:namespace hyprland-shell:bar
layerrule = blur, match:namespace hyprland-shell:notifs
layerrule = ignorealpha 0.41, match:namespace hyprland-shell:notifs
layerrule = noanim, match:namespace hyprland-shell:notifs

# hyprlang if !HLDE_NO_TRANSPARENT

windowrule = opacity 0.95, match:fullscreen 0
windowrule = opacity 0.95, match:class org\.kde\.dolphin
windowrule = opacity 1, match:class kitty

# hyprlang endif

windowrule = float, match:class hyprland\-share\-picker